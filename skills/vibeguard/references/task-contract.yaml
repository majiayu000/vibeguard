# VibeGuard Task Contract
# Each development task must pass this checklist before starting

task_contract:
  required:
    - objective: "clear and verifiable goal"
    - data_source: "Data source (file/API/database)"
    - acceptance: "Acceptance criteria (at least 1 testable)"
    - scope: "scope of influence (file list or module)"

  forbidden:
    - "Write first and then talk"
    - "Probably/might/should work"
    - "Direct copy"
    - "Let's do this first and then change it later"
    - "Should be no problem"

  warnings:
    no_search_before_create:
      description: "Existing implementations are not searched before creating new files/classes/functions"
      severity: high
      action: "Execute the search immediately to confirm that there is no existing implementation"

    no_test_evidence:
      description: "Step completed but no test evidence"
      severity: high
      action: "Supplementary test commands and result records"

    large_diff:
      description: "More than 300 lines of net changes in a single step"
      severity: medium
      action: "Split into multiple small steps"

    no_spec:
      description: "3+ file changes without writing spec first"
      severity: medium
      action: "Write the spec first and then implement it"

    mixed_naming:
      description: "Python internally mixes camelCase and snake_case"
      severity: high
      action: "Unify to snake_case, use conversion function for boundaries"

# Verify command
validation:
  pre_task:
    - command: "grep -rn 'class.*Protocol' <APP_ROOT>/ --include='*.py'"
      purpose: "Check if a similar Protocol already exists"
    - command: "python ${VIBEGUARD_DIR}/guards/python/check_duplicates.py"
      purpose: "Check current duplicate status"

  post_task:
    - command: "pytest tests/architecture/ -v"
      purpose: "Run the architecture guard"
    - command: "python ${VIBEGUARD_DIR}/guards/python/check_naming_convention.py <APP_ROOT>/"
      purpose: "Check naming convention"
    - command: "python ${VIBEGUARD_DIR}/guards/python/check_duplicates.py --strict"
      purpose: "Check that there are no new duplicates"
