id: rs-03-unwrap
language: Rust
severity: warning
rule:
  pattern: $VAL.unwrap()
message: ".unwrap() in production code. Fix: use ? operator or unwrap_or* variants"
---
id: rs-03-expect
language: Rust
severity: warning
rule:
  pattern: $VAL.expect($MSG)
message: ".expect() in production code. Fix: propagating errors using ? operator"
