id: ts-01-as-any-ts
language: TypeScript
severity: warning
rule:
  pattern: $X as any
message: "'as any' bypasses type checking. Fix: Use concrete types or type assertion 'as SpecificType'"
---
id: ts-01-colon-any-ts
language: TypeScript
severity: warning
rule:
  kind: type_annotation
  has:
    kind: predefined_type
    regex: "^any$"
message: "': any' type annotation. Fix: use concrete type instead of any"
---
id: ts-01-as-any-tsx
language: Tsx
severity: warning
rule:
  pattern: $X as any
message: "'as any' bypasses type checking. Fix: Use concrete types or type assertion 'as SpecificType'"
---
id: ts-01-colon-any-tsx
language: Tsx
severity: warning
rule:
  kind: type_annotation
  has:
    kind: predefined_type
    regex: "^any$"
message: "': any' type annotation. Fix: use concrete type instead of any"
