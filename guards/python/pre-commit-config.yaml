# VibeGuard Pre-commit Hooks Template
#
# How to use:
# 1. Copy this file to the project root directory and rename it to .pre-commit-config.yaml
# 2. Modify paths and configuration to match your project structure
# 3. Run: pip install pre-commit && pre-commit install
# 4. Manual operation: pre-commit run --all-files

default_language_version:
  python: python3.11

repos:
  # === Basic Hygiene ===
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  # === Python Linting + Formatting (Ruff) ===
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.2
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^(app|src|tests)/
      - id: ruff-format
        files: ^(app|src|tests)/

  # === Custom naming convention check ===
  # Uncomment and modify the path to enable
  # - repo: local
  #   hooks:
  #     - id: check-naming-convention
  #       name: Check Python naming convention (snake_case)
  #       entry: python scripts/check_naming_convention.py
  #       language: python
  #       types: [python]
  #       files: ^(app|src)/
  #       pass_filenames: true

  # === Shell script check ===
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [-x]

  # === Secret scan ===
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.22.1
    hooks:
      - id: gitleaks

  # === Submission information specifications ===
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.0.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [--strict, feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert]

  # === TypeScript/JavaScript (uncomment to enable) ===
  # - repo: local
  #   hooks:
  #     - id: eslint
  #       name: eslint
  #       entry: bash -c 'cd frontend && npm run lint'
  #       language: system
  #       files: ^frontend/src/.*\.(ts|tsx|js|jsx)$
  #       pass_filenames: false
