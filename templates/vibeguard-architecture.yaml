# VibeGuard architecture definition — dependency layer direction constraints
#
# Copy to the project root directory .vibeguard-architecture.yaml and modify it according to the actual structure of the project.
# Guard check_dependency_layers.py reads this file to detect cross-layer violations.
#
# Rules: Each layer can only import the layers listed in allowed_deps. Violations will be blocked by guards.
# Dependency direction: Types → Config → Repo → Service → Runtime → UI (one-way flow)

layers:
  - name: "types"
    paths: ["src/types/", "src/models/", "src/schemas/"]
    allowed_deps: []

  - name: "config"
    paths: ["src/config/"]
    allowed_deps: ["types"]

  - name: "repo"
    paths: ["src/repo/", "src/dal/", "src/db/"]
    allowed_deps: ["types", "config"]

  - name: "service"
    paths: ["src/service/", "src/services/", "src/business/"]
    allowed_deps: ["types", "config", "repo"]

  - name: "runtime"
    paths: ["src/runtime/", "src/server/", "src/app/"]
    allowed_deps: ["types", "config", "repo", "service"]

  - name: "ui"
    paths: ["src/ui/", "src/components/", "src/pages/", "src/views/"]
    allowed_deps: ["types", "config", "service"]
