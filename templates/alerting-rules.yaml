# VibeGuard Alerting Rules — Prometheus Alerting Rules
#
# Copy to the Prometheus alerting rules directory for use.
# You need to export metrics through metrics-exporter.sh first.
#
# Usage:
#   cp templates/alerting-rules.yaml /etc/prometheus/rules/vibeguard.yaml
# # Or integrate into existing alerting rules configuration

groups:
  - name: vibeguard
    rules:
      # The guard violation rate is too high - maybe the code quality has declined or the rules need to be adjusted
      - alert: HighViolationRate
        expr: >
          sum(rate(vibeguard_guard_violation_total[1h])) /
          sum(rate(vibeguard_hook_trigger_total[1h])) > 0.3
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "VibeGuard violation rate exceeds 30%"
          description: >
            Guard violation rate in the past hour was {{ $value | humanizePercentage }}.
            Check if there are any newly introduced code patterns that are triggering too many warnings.
            Run /vibeguard:stats to see details.

      #Hook execution timeout — possible guard script performance degradation
      - alert: SlowHookExecution
        expr: >
          vibeguard_hook_duration_seconds_sum /
          vibeguard_hook_duration_seconds_count > 10
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "VibeGuard Hook {{ $labels.hook }} takes more than 10s on average"
          description: >
            The average execution time of Hook {{ $labels.hook }} is {{ $value | humanizeDuration }}.
            Check the guard script for performance issues.

      # Agent is not active - maybe the session is not running properly
      - alert: NoRecentEvents
        expr: >
          time() - vibeguard_events_total > 86400
        for: 24h
        labels:
          severity: info
        annotations:
          summary: "VibeGuard has no new events for more than 24 hours"
          description: >
            No new events have been written to events.jsonl in over 24 hours.
            If the AI agent should be in active use, check if hooks are firing normally.

      # Block events suddenly increase - there may be a systemic problem
      - alert: HighBlockRate
        expr: >
          sum(rate(vibeguard_hook_trigger_total{decision="block"}[1h])) > 5
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "VibeGuard Block event sudden increase"
          description: >
            Block rate over the past 30 minutes was {{ $value }}/h.
            There may be a systemic security issue or misconfiguration.
            Run /vibeguard:stats to see details of intercepted operations.
